<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada · Wasi Café</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0D0A08">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0D0A08; --text:#F5EFE7; --dim:#9B8B7E; --gold:#C8943E; --gold-text:#DAA84E; --display:'Cormorant Garamond',serif; --body:'Manrope',system-ui,sans-serif; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:var(--body); min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem; }
    a:focus-visible, .home-btn:focus-visible { outline:2px solid var(--gold); outline-offset:3px; }
    .wrap { max-width:520px; }
    .mark { font-family:var(--display); font-size:clamp(5rem,18vw,9rem); font-weight:400; line-height:1; color:var(--gold-text); letter-spacing:0.02em; }
    h1 { font-family:var(--display); font-size:clamp(1.6rem,5vw,2.3rem); font-weight:500; margin:0.4rem 0 0.8rem; }
    p { color:var(--dim); font-size:1rem; line-height:1.6; margin-bottom:2rem; }
    .home-btn { display:inline-block; background:var(--gold); color:#1a1208; font-weight:600; text-decoration:none; padding:0.85rem 2rem; border-radius:100px; transition:transform .2s ease, background .2s ease; }
    .home-btn:hover { transform:translateY(-2px); background:var(--gold-text); }
    .links { margin-top:1.5rem; font-size:0.9rem; }
    .links a { color:var(--dim); text-decoration:none; margin:0 0.6rem; border-bottom:1px solid transparent; transition:color .2s, border-color .2s; }
    .links a:hover { color:var(--gold-text); border-color:var(--gold-text); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="mark" aria-hidden="true">404</div>
    <h1>Esta página se nos enfrió</h1>
    <p>No encontramos lo que buscabas, pero el café sigue caliente. Vuelve al inicio y te servimos algo rico.</p>
    <a class="home-btn" href="/">Volver al inicio</a>
    <nav class="links" aria-label="Enlaces útiles">
      <a href="/carta.html">Ver la carta</a>
      <a href="/curso.html">Curso de barismo</a>
      <a href="https://wa.me/51908724496">WhatsApp</a>
    </nav>
  </main>
</body>
</html>
